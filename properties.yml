---
# AI Assistant Repository Properties
# Central configuration for all scripts and automation

icloud:
  path: "$HOME/Library/Mobile Documents/iCloud~md~obsidian/Documents/template_ai_assistant/"

repo:
  local: "$HOME/Development/levonbecker/template_ai_assistant"
  remote: "github.com/LevonBecker/template_ai_assistant"

# Where /sync-setup pulls shared tooling updates from (modules/, tasks/, .github/, .claude/, etc.).
skeleton:
  local: "$HOME/Development/levonbecker/template_python"
  remote: "github.com/LevonBecker/template_python"

screenshots:
  cleanup_patterns:
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.PNG"
    - "*.JPG"
    - "*.JPEG"
  latest_file: "latest.png"
  location: "$HOME/Development/levonbecker/template_ai_assistant/screenshots"
  preserve_files:
    - "latest.png"
